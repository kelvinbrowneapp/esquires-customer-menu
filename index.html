<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Esquires Coffee — Menu</title>
</head>
<body>
<h2>Loading menu...</h2>

<div id="menu"></div>

<script>
const API_URL = "https://esquires-menu-api.onrender.com/customer-menu";
let MENU = [];

async function loadMenu() {
  try {
    const res = await fetch(API_URL);
    MENU = await res.json();

    const container = document.getElementById("menu");
    container.innerHTML = MENU.map(item => `
      <div style="padding:10px;border-bottom:1px solid #ccc;">
        <strong>${item.name}</strong><br/>
        ${item.desc || ""}
      </div>
    `).join("");

  } catch (e) {
    document.getElementById("menu").innerHTML = "Menu failed to load";
  }
}

loadMenu();
</script>

</body>
</html>
